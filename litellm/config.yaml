model_list:
  # ===========================================
  # Luigi Chat Model Aliases
  # ===========================================
  
  # luigi-thinking -> MiniMax M2.7
  # Chat principal con razonamiento avanzado
  - model_name: luigi-thinking
    litellm_params:
      model: minimax/MiniMax-M2.7
      api_base: https://api.minimax.io/v1
      api_key: os.environ/MINIMAX_API_KEY
      rpm: 60

  # luigi-vision -> MiniMax Text-01
  # Analisis de imagenes
  - model_name: luigi-vision
    litellm_params:
      model: minimax/MiniMax-Text-01
      api_base: https://api.minimax.io/v1
      api_key: os.environ/MINIMAX_API_KEY
      rpm: 60

  # luigi-voice -> MiniMax Speech 2.6 HD
  # Text-to-Speech con baja latencia
  - model_name: luigi-voice
    litellm_params:
      model: minimax/speech-2.6-hd
      api_base: https://api.minimax.io/v1
      api_key: os.environ/MINIMAX_API_KEY
      rpm: 60

litellm_settings:
  # Drop parameters not supported by provider
  drop_params: true
  
  # Set verbose logging
  set_verbose: false
  
  # Maximum parallel requests
  max_parallel_requests: 100
  
  # Custom callback handlers (optional)
  # success_callback: ["langfuse", "dynamiq"]
  
  # Default key generation params
  default_key_generate_params:
    rpm_limit: 3
    tpm_limit: 6000
    max_budget: 100

general_settings:
  # Master key for admin operations (must start with sk-)
  master_key: os.environ/LITELLM_MASTER_KEY
  
  # Database URL for key storage
  database_url: os.environ/DATABASE_URL
  
  # Redis URL for caching
  redis_url: os.environ/REDIS_URL
  
  # Server settings
  port: 4000
  host: 0.0.0.0
  
  # UI settings
  ui_access_mode: "admin"  # Only admins can access UI
