version: '3.8'

services:
  # ===========================================
  # PostgreSQL Database
  # ===========================================
  postgres:
    image: postgres:15-alpine
    container_name: luigi-test-postgres
    environment:
      POSTGRES_DB: luigi_test
      POSTGRES_USER: luigi
      POSTGRES_PASSWORD: luigi_test_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luigi"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - luigi-test-network

  # ===========================================
  # Redis Cache
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: luigi-test-redis
    command: redis-server --requirepass luigi_test_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "luigi_test_redis", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - luigi-test-network

  # ===========================================
  # Backend FastAPI (Test)
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: luigi-test-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://luigi:luigi_test_pass@postgres:5432/luigi_test
      REDIS_URL: redis://:luigi_test_redis@redis:6379/0
      LITELLM_MASTER_KEY: sk-test-litellm-key
      LITELLM_PROXY_URL: http://localhost:4000
      MINIMAX_API_KEY: test-minimax-key
      SECRET_KEY: test-secret-key
      WEBUI_NAME: "Luigi Chat Test"
      DEBUG: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - luigi-test-network

  # ===========================================
  # Frontend SvelteKit (Test)
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: luigi-test-frontend
    environment:
      PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - luigi-test-network

# ===========================================
# Networks
# ===========================================
networks:
  luigi-test-network:
    driver: bridge