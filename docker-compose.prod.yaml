# ===========================================
# Luigi Chat - Production Docker Compose
# ===========================================

version: '3.8'

services:
  # ===========================================
  # PostgreSQL Database
  # ===========================================
  postgres:
    image: postgres:15-alpine
    container_name: luigi-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-luigi_chat}
      POSTGRES_USER: ${POSTGRES_USER:-luigi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-luigi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - luigi-network

  # ===========================================
  # Redis Cache
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: luigi-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - luigi-network

  # ===========================================
  # LiteLLM Proxy (AI Gateway)
  # ===========================================
  litellm:
    build:
      context: ./litellm
      dockerfile: Dockerfile
    container_name: luigi-litellm-prod
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_LOG_LEVEL: ${LOG_LEVEL:-WARNING}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - luigi-network

  # ===========================================
  # Backend FastAPI
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: luigi-backend-prod
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_PROXY_URL: ${LITELLM_PROXY_URL:-http://litellm:4000}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      MINIMAX_API_BASE_URL: ${MINIMAX_API_BASE_URL:-https://api.minimax.io}
      SECRET_KEY: ${SECRET_KEY}
      WEBUI_NAME: ${WEBUI_NAME:-Luigi Chat}
      DEFAULT_RPM_LIMIT: ${DEFAULT_RPM_LIMIT:-3}
      DEFAULT_TPM_LIMIT: ${DEFAULT_TPM_LIMIT:-6000}
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_started
    networks:
      - luigi-network

  # ===========================================
  # Frontend SvelteKit (Static)
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: luigi-frontend-prod
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
    networks:
      - luigi-network

  # ===========================================
  # Nginx Reverse Proxy
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: luigi-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - luigi-network

# ===========================================
# Volumes
# ===========================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ===========================================
# Networks
# ===========================================
networks:
  luigi-network:
    driver: bridge
